# Railway deployment config — Frontend (Next.js)
# https://railway.app
#
# Deploy via Railway dashboard:
#   1. In the same project, add another service → select /frontend directory
#   2. Railway auto-detects the Dockerfile
#   3. Add one variable in the Variables tab:
#        BACKEND_URL = https://shadowbroker-backend.railway.app
#      (use the public URL from your backend Railway service)
#   4. The frontend will be available at https://shadowbroker-frontend.railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Next.js standalone server — PORT is injected by Railway
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
