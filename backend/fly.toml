app = "shadowbroker-backend"
primary_region = "fra"

# Build context = backend/ directory (where this file lives), auto-detects Dockerfile
[build]

[env]
  CORS_ORIGINS = "https://tangobravoiki.github.io"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
